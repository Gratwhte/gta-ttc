<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini GTA</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="characterSelect">
  <h1>MINI GTA</h1>
  <p>Choose Your Character</p>
  <div id="charGrid"></div>
  <div id="selectButtons">
    <button id="startBtn">START GAME</button>
    <button id="leaderboardBtn">🏆 LEADERBOARD</button>
  </div>
</div>

<!-- Leaderboard screen -->
<div id="leaderboardScreen">
  <h1>🏆 HALL OF FAME 🏆</h1>
  <div id="leaderboardList"></div>
  <div id="leaderboardButtons">
    <button id="closeLeaderboardBtn">BACK</button>
    <button id="clearLeaderboardBtn">CLEAR ALL</button>
  </div>
</div>

<!-- Score submission dialog -->
<div id="scoreSubmit">
  <h2>🎯 NEW SCORE!</h2>
  <div id="scoreStats"></div>
  <div id="scoreRank"></div>
  <input type="text" id="playerName" placeholder="Enter your name" maxlength="15" autocomplete="off">
  <div id="scoreSubmitButtons">
    <button id="submitScoreBtn">SUBMIT</button>
    <button id="skipScoreBtn">SKIP</button>
  </div>
</div>

<div id="hud">
  <div>❤️ Health: <span id="health">100</span></div>
  <div>💰 Money: $<span id="money">0</span></div>
  <div>⭐ Wanted: <span id="wanted">☆☆☆☆☆</span></div>
  <div>🔫 Ammo: <span id="ammo">50</span></div>
  <div>🎯 Score: <span id="score">0</span></div>
  <div id="vehStatus">🚶 On foot</div>
</div>

<div id="info">
  WASD/Arrows: Move/Drive | Mouse: Aim | Click: Shoot | E: Enter/Exit vehicle | Shift: Run
</div>

<div id="gameOver">
  <div>💀 WASTED 💀</div>
  <div id="gameOverScore"></div>
  <button id="tryAgainBtn">Try Again</button>
</div>

<div id="cheatBox">
  <div id="cheatLabel">🤫 Enter Cheat:</div>
  <input type="text" id="cheatInput" autocomplete="off" spellcheck="false">
  <div id="cheatMsg"></div>
</div>

<canvas id="game"></canvas>

<script src="characters.js"></script>
<script src="leaderboard.js"></script>
<script src="game.js"></script>
</body>
</html>
